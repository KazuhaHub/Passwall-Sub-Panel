name: Release

# Single pipeline that produces both the GitHub Release archives and the
# ghcr.io multi-arch container image from one set of binaries. The previous
# split-workflow setup compiled the web bundle three times (release + docker
# amd64 + docker arm64 under QEMU) and the linux binaries four times. Here:
#
#   web         → builds the SPA once
#   build       → cross-compiles 5 platforms natively in parallel (matrix)
#   release     → packages tarballs/zips + checksums and publishes the Release
#   docker      → reuses the linux/amd64 + linux/arm64 binaries to push a
#                 multi-arch image (no compilation inside the container build)
#
# The binary you sha256-verify from the Release is byte-identical to the one
# baked into the Docker image, because they come from the same artifact.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  setup:
    name: Resolve tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      owner_lc: ${{ steps.tag.outputs.owner_lc }}
    steps:
      - name: Resolve tag and owner
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          owner_lc=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "owner_lc=${owner_lc}" >> "$GITHUB_OUTPUT"

  web:
    name: Build web assets
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web-react/package-lock.json

      - name: Install dependencies
        working-directory: web-react
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build SPA bundle
        working-directory: web-react
        # vite.config.ts writes to ../internal/web/dist for //go:embed.
        run: npm run build

      - name: Upload web bundle
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: internal/web/dist
          if-no-files-found: error
          retention-days: 1

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: [setup, web]
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64, ext: ""     }
          - { goos: linux,   goarch: arm64, ext: ""     }
          - { goos: darwin,  goarch: amd64, ext: ""     }
          - { goos: darwin,  goarch: arm64, ext: ""     }
          - { goos: windows, goarch: amd64, ext: ".exe" }
          - { goos: windows, goarch: arm64, ext: ".exe" }
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache-dependency-path: go.sum

      - name: Download web bundle
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: internal/web/dist

      - name: Build psp
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ needs.setup.outputs.tag }}
          COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p out
          short_sha="${COMMIT:0:7}"
          build_date="$(date -u +%FT%TZ)"
          ldflags="-s -w"
          ldflags+=" -X github.com/KazuhaHub/passwall-sub-panel/internal/version.Version=${VERSION}"
          ldflags+=" -X github.com/KazuhaHub/passwall-sub-panel/internal/version.Commit=${short_sha}"
          ldflags+=" -X github.com/KazuhaHub/passwall-sub-panel/internal/version.BuildDate=${build_date}"
          go build -trimpath -ldflags="${ldflags}" -o "out/psp${{ matrix.ext }}" ./cmd/panel

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: psp-${{ matrix.goos }}-${{ matrix.goarch }}
          path: out/psp${{ matrix.ext }}
          if-no-files-found: error
          retention-days: 1

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [setup, build]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all binaries
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: psp-*

      - name: Package archives
        shell: bash
        env:
          VERSION: ${{ needs.setup.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p dist build

          for dir in artifacts/psp-*; do
            name_part="${dir#artifacts/psp-}"      # e.g. linux-amd64
            goos="${name_part%-*}"
            goarch="${name_part##*-}"

            pkgname="passwall-sub-panel_${VERSION}_${goos}_${goarch}"
            pkgdir="build/${pkgname}"
            mkdir -p "${pkgdir}/config"

            ext=""
            if [ "${goos}" = "windows" ]; then
              ext=".exe"
            fi

            cp "${dir}/psp${ext}" "${pkgdir}/psp${ext}"
            chmod +x "${pkgdir}/psp${ext}" || true

            # README + example config are tracked — copy without swallowing
            # errors so a genuinely missing file fails the release loudly.
            cp README.md "${pkgdir}/"
            cp config/config.yaml.example "${pkgdir}/"
            # Bundle DEFAULT rulesets/templates from the committed seed dir.
            # config/templates and config/rulesets are git-ignored (runtime,
            # absent on a clean checkout), so copying from there silently
            # shipped archives WITHOUT defaults. internal/seed/files/ is the
            # same source the binary embeds and releases on first boot.
            cp -R internal/seed/files/templates "${pkgdir}/config/"
            cp -R internal/seed/files/rulesets  "${pkgdir}/config/"

            if [ "${goos}" = "windows" ]; then
              (cd build && zip -qr "../dist/${pkgname}.zip" "${pkgname}")
            else
              tar -C build -czf "dist/${pkgname}.tar.gz" "${pkgname}"
            fi
          done

          (cd dist && sha256sum * > SHA256SUMS.txt)

      - name: Generate release body
        shell: bash
        env:
          VERSION: ${{ needs.setup.outputs.tag }}
          OWNER_LC: ${{ needs.setup.outputs.owner_lc }}
        run: |
          cat <<EOF > release_notes.md
          ### Docker image (ghcr.io)

          \`\`\`shell
          docker pull ghcr.io/${OWNER_LC}/passwall-sub-panel:latest
          # Or specific version
          docker pull ghcr.io/${OWNER_LC}/passwall-sub-panel:${VERSION}
          \`\`\`

          ### Verify

          \`\`\`shell
          sha256sum -c SHA256SUMS.txt
          \`\`\`
          EOF

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.setup.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ needs.setup.outputs.tag }}
          # Mark pre-release tags (anything with a "-beta"/"-rc"/... suffix) as a
          # GitHub pre-release so /releases/latest excludes them — PSP's in-app
          # self-update nudge (psp_upgrade alert) reads /releases/latest and must
          # only ever point at a STABLE release, never a beta.
          prerelease: ${{ contains(needs.setup.outputs.tag, '-') }}
          generate_release_notes: true
          body_path: release_notes.md
          append_body: true
          files: |
            dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Publish container image
    runs-on: ubuntu-latest
    needs: [setup, build]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download linux/amd64 binary
        uses: actions/download-artifact@v8
        with:
          name: psp-linux-amd64
          path: bin/linux-amd64

      - name: Download linux/arm64 binary
        uses: actions/download-artifact@v8
        with:
          name: psp-linux-arm64
          path: bin/linux-arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ needs.setup.outputs.owner_lc }}/passwall-sub-panel
          tags: |
            type=raw,value=${{ needs.setup.outputs.tag }}
            # `latest` tracks STABLE releases only — never a pre-release. This
            # mirrors GitHub's /releases/latest (and PSP's in-app self-update
            # nudge), so a deploy pinned to :latest stays on the stable channel.
            # Pre-release tags (anything with a "-beta"/"-rc"/... suffix) get the
            # rolling :beta tag instead, so opt-in testers can pin image: ...:beta.
            type=raw,value=latest,enable=${{ startsWith(needs.setup.outputs.tag, 'v') && !contains(needs.setup.outputs.tag, '-') }}
            type=raw,value=beta,enable=${{ contains(needs.setup.outputs.tag, '-') }}
          labels: |
            org.opencontainers.image.title=passwall-sub-panel
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.setup.outputs.tag }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.release
          # No QEMU emulation needed: Dockerfile.release only COPYs the
          # pre-built per-arch binary; alpine itself is multi-arch.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
