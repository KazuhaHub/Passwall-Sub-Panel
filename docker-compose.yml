# Zero-clone deploy:
#   mkdir -p /opt/Passwall-Sub-Panel && cd /opt/Passwall-Sub-Panel
#   curl -O https://raw.githubusercontent.com/KazuhaHub/Passwall-Sub-Panel/main/docker-compose.yml
#   docker compose up -d
#
# After first launch, ./config/ appears on the host with config.yaml +
# templates/ + rulesets/ seeded from the image. Edit them directly with any
# host editor, then `docker compose restart psp`.

services:
  psp:
    image: ghcr.io/kazuhahub/passwall-sub-panel:latest
    container_name: psp
    restart: unless-stopped
    pull_policy: always

    # Host networking so PSP can reach a co-located 3X-UI at 127.0.0.1:<port>
    # without extra_hosts gymnastics. The listen port is whatever you set in
    # config.yaml (`listen: ":8788"` by default).
    network_mode: host

    volumes:
      - ./config:/app/config     # bind mount: edit on the host with any editor
      - psp-data:/app/data       # named volume for SQLite + runtime data

    environment:
      # Where the binary looks for config.yaml inside the container. Matches
      # the bind-mount target above, so the file is just ./config/config.yaml
      # on the host.
      PSP_CONFIG: /app/config/config.yaml

      # Reverse-proxy CIDRs allowed to set X-Forwarded-For. Only relevant if
      # PSP sits behind Nginx/Caddy on a non-loopback address. Default below
      # covers a local reverse proxy; uncomment and override for other setups.
      # PSP_TRUSTED_PROXIES: "127.0.0.1,::1"

    # --- Building from source (uncomment to override the GHCR image) -----
    # build: .

volumes:
  psp-data:
