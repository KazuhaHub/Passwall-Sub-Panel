services:
  psp:
    # To build locally: docker compose build
    # To pull from GHCR:  comment out 'build' and use the image tag directly.
    build: .
    image: ghcr.io/kazuhahub/passwall-sub-panel:latest
    container_name: psp
    restart: unless-stopped
    # Host networking lets PSP reach a 3X-UI panel running on the same host
    # at 127.0.0.1:<port> without exposing 3X-UI publicly. The listen port is
    # whatever you set in config.yaml (`listen: ":8788"` by default).
    network_mode: host
    volumes:
      - ./config:/app/config:ro
      - psp-data:/app/data
    environment:
      PSP_CONFIG: /app/config/config.yaml
      # PSP_JWT_SECRET and PSP_ENCRYPTION_KEY override the same-named fields in
      # config.yaml. Leave them unset and the panel auto-generates them on first
      # launch (written back into config.yaml). Inject via env when you want to
      # ship a config.yaml without baked-in secrets.
      # Generate with: openssl rand -base64 36
      PSP_JWT_SECRET: ${PSP_JWT_SECRET:-}
      PSP_ENCRYPTION_KEY: ${PSP_ENCRYPTION_KEY:-}
      # MySQL DSN overrides the mysql block in config.yaml. Leave unset to use
      # the embedded SQLite at /app/data/panel.db (default).
      PSP_MYSQL_DSN: ${PSP_MYSQL_DSN:-}

volumes:
  psp-data:
