services:
  psp:
    # To build locally: docker compose build
    # To pull from GHCR:  comment out 'build' and use the image tag directly.
    build: .
    image: ghcr.io/kazuhahub/passwall-sub-panel:latest
    container_name: psp
    restart: unless-stopped
    ports:
      - "127.0.0.1:8788:8788"
    volumes:
      - ./config:/app/config:ro
      - psp-data:/app/data
    environment:
      PSP_CONFIG: /app/config/config.yaml
      # PSP_SECRET_KEY decrypts the "enc:..." fields in xui_panels.yaml.
      # Generate with: openssl rand -hex 16
      PSP_SECRET_KEY: ${PSP_SECRET_KEY}
      # MySQL DSN overrides the one in config.yaml if set.
      PSP_MYSQL_DSN: ${PSP_MYSQL_DSN}
      PSP_JWT_SECRET: ${PSP_JWT_SECRET}

volumes:
  psp-data:
