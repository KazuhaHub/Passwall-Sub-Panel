# Sample Nginx reverse proxy for Passwall-Sub-Panel.
# Drop into /etc/nginx/conf.d/ (or sites-available/) and reload.

upstream psp_backend {
    server 127.0.0.1:8788;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name sub.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sub.example.com;

    # Replace with paths to your real cert/key, e.g. from certbot.
    ssl_certificate     /etc/letsencrypt/live/sub.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sub.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # gzip for the SPA's JS/CSS/JSON and subscription YAML. Clients send
    # Accept-Encoding for sub fetches too, so compressing them shaves a
    # real chunk off cellular refreshes.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/yaml
        text/x-yaml
        application/javascript
        application/json
        application/yaml
        application/x-yaml
        application/xml
        image/svg+xml;

    # Reasonable client body limit; SAML POST + admin actions are tiny.
    client_max_body_size 1m;

    # Cache headers for the SPA are driven by the backend — /assets/* is
    # served with `Cache-Control: immutable` (hashed filenames) and
    # index.html with `Cache-Control: no-cache`. Don't override here.

    # Anything (admin SPA, /api, /sub, SAML ACS) goes to psp.
    location / {
        proxy_pass http://psp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        # Subscription render for a user with many nodes + a regenerated
        # rule_set can serialise into a 500 KB+ blob. 5 min is a safety
        # net — typical sub fetch is single-digit seconds.
        proxy_read_timeout 300s;
        proxy_send_timeout 60s;
        # SAML ACS POST carries a SAMLResponse the IdP signed; don't
        # spool it through nginx, send straight to the upstream.
        proxy_request_buffering off;
    }
}
